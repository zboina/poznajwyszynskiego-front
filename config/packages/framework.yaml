# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(APP_SECRET)%'

    # Note that the session will be started ONLY if you read or write from it.
    session:
        # Własna nazwa ciasteczka — panel admina stoi na tym samym hoście (inny port),
        # a ciasteczka są współdzielone między portami. Bez tego sesje obu aplikacji kolidują.
        name: WEB_PWSESSID
        cookie_lifetime: 3600
        gc_maxlifetime: 3600

    #esi: true
    #fragments: true

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
